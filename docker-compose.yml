version: '3.8'

services:
  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus@postgres:5432/knowledge_nexus
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=nexus_graph
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=nexus_search_key
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STORAGE_PATH=/app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - neo4j
      - qdrant
      - meilisearch
      - redis

  # ---- Frontend (React + Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knowledge_nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---- Neo4j ----
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/nexus_graph
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"  # Web UI
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data

  # ---- Qdrant (向量数据库) ----
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ---- Meilisearch (全文检索) ----
  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: nexus_search_key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  # ---- Redis (缓存 + 任务队列) ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  meilisearch_data:
  redis_data:
